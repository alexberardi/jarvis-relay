version: '3.9'

services:
  jarvis-notifications-relay:
    build: .
    ports:
      - "${RELAY_PORT:-7735}:${RELAY_PORT:-7735}"
    volumes:
      - ./app:/app/app
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port ${RELAY_PORT:-7735} --reload
