app = "jarvis-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RELAY_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
